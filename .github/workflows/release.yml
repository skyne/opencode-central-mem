name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build client plugin
        run: |
          cd client
          bun install
          bun run build

      - name: Package client plugin
        run: |
          mkdir -p dist/plugin
          cp -r client/dist client/package.json dist/plugin/
          cp README.md dist/plugin/
          cd dist/plugin
          tar czf ../opencode-central-mem-plugin.tar.gz .

      - name: Package server
        run: |
          cd server
          tar czf ../dist/opencode-central-mem-server.tar.gz \
            --exclude=node_modules \
            --exclude=tests \
            src public package.json tsconfig.json Dockerfile

      - name: Upload release artifacts
        run: |
          gh release create ${{ github.ref_name }} \
            dist/opencode-central-mem-plugin.tar.gz \
            dist/opencode-central-mem-server.tar.gz \
            --title "${{ github.ref_name }}" \
            --notes "See [CHANGES](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }})" \
            --target ${{ github.sha }} \
            --latest
        env:
          GH_TOKEN: ${{ github.token }}
