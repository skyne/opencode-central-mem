<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Central Memory Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f1a; color: #c8d6e5; min-height: 100vh; }
  .container { max-width: 900px; margin: 0 auto; padding: 20px; }
  header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid #1e2a3a; }
  h1 { font-size: 24px; color: #00d4ff; }
  h1 span { color: #485; }
  .stats-row { display: flex; gap: 16px; margin-bottom: 20px; }
  .stat-card { background: #151528; border: 1px solid #1e2a3a; border-radius: 10px; padding: 16px 20px; flex: 1; }
  .stat-card .num { font-size: 28px; font-weight: 700; color: #00d4ff; }
  .stat-card .label { font-size: 12px; color: #657; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }
  .search-box { display: flex; gap: 8px; margin-bottom: 20px; }
  .search-box input { flex: 1; padding: 12px 16px; border: 1px solid #1e2a3a; border-radius: 8px; background: #151528; color: #c8d6e5; font-size: 14px; outline: none; transition: border 0.2s; }
  .search-box input:focus { border-color: #00d4ff; }
  .search-box button { padding: 12px 24px; background: #00d4ff; color: #0f0f1a; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; transition: opacity 0.2s; }
  .search-box button:hover { opacity: 0.85; }
  .memory { background: #151528; border: 1px solid #1e2a3a; border-radius: 10px; padding: 16px 20px; margin-bottom: 12px; transition: border-color 0.2s; }
  .memory:hover { border-color: #2a3a5a; }
  .memory .content { font-size: 14px; line-height: 1.6; margin-bottom: 10px; }
  .memory .meta { display: flex; gap: 12px; flex-wrap: wrap; font-size: 12px; color: #657; align-items: center; }
  .memory .tag { background: #0a1a2a; color: #00d4ff; padding: 2px 10px; border-radius: 12px; font-size: 11px; }
  .memory .source { color: #485; }
  .memory .time { color: #485; }
  .empty { text-align: center; padding: 60px 20px; color: #485; }
  .empty .icon { font-size: 48px; margin-bottom: 12px; }
  .toast { position: fixed; bottom: 20px; right: 20px; background: #151528; border: 1px solid #1e2a3a; border-radius: 10px; padding: 12px 20px; font-size: 13px; display: none; }
  .fade-in { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .loading { text-align: center; padding: 40px; }
  .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid #1e2a3a; border-top-color: #00d4ff; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .badge { display: inline-block; background: #0a2a1a; color: #4a8; padding: 2px 8px; border-radius: 4px; font-size: 11px; }
  .filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .filter-btn { background: #151528; border: 1px solid #1e2a3a; color: #657; padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 12px; transition: all 0.2s; }
  .filter-btn.active { background: #00d4ff; color: #0f0f1a; border-color: #00d4ff; }
  .filter-btn:hover { border-color: #00d4ff; color: #c8d6e5; }
  #tokenInput { width: 100%; padding: 10px; background: #151528; border: 1px solid #1e2a3a; border-radius: 8px; color: #c8d6e5; font-size: 13px; margin-bottom: 16px; font-family: monospace; }
  .tabs { display: flex; gap: 4px; margin-bottom: 20px; }
  .tab { padding: 8px 20px; border: 1px solid #1e2a3a; border-radius: 8px 8px 0 0; cursor: pointer; font-size: 13px; background: #0f0f1a; color: #657; transition: all 0.2s; }
  .tab.active { background: #151528; color: #00d4ff; border-bottom-color: #151528; }
  .tab:hover { color: #c8d6e5; }
  .panel { display: none; }
  .panel.active { display: block; }
  .groom-entry { background: #151528; border: 1px solid #1e2a3a; border-radius: 10px; padding: 14px 18px; margin-bottom: 10px; font-size: 13px; }
  .groom-entry .action { display: inline-block; padding: 2px 10px; border-radius: 4px; font-weight: 600; font-size: 11px; text-transform: uppercase; }
  .groom-entry .action.merge { background: #1a2a3a; color: #4a8; }
  .groom-entry .action.reconcile { background: #2a1a3a; color: #a8f; }
  .groom-entry .action.flag { background: #2a2a1a; color: #fa8; }
  .groom-entry .action.delete { background: #3a1a1a; color: #e45; }
  .groom-entry .status { display: inline-block; padding: 2px 10px; border-radius: 4px; font-size: 11px; margin-left: 8px; }
  .groom-entry .status.applied { background: #0a2a1a; color: #4a8; }
  .groom-entry .status.pending { background: #2a2a1a; color: #fa8; }
  .groom-entry .status.rejected { background: #3a1a1a; color: #e45; }
  .groom-entry .reason { color: #657; margin-top: 6px; font-style: italic; }
  .groom-entry .meta { color: #485; font-size: 11px; margin-top: 6px; display: flex; gap: 12px; }
  .groom-btn { padding: 6px 14px; border-radius: 6px; border: none; cursor: pointer; font-size: 12px; font-weight: 600; transition: opacity 0.2s; }
  .groom-btn:hover { opacity: 0.8; }
  .groom-btn.apply { background: #4a8; color: #0f0f1a; }
  .groom-btn.reject { background: #e45; color: #fff; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🧠 <span>Central Memory</span></h1>
    <div id="statusDot" style="width:10px;height:10px;border-radius:50%;background:#4a8;"></div>
  </header>

  <input type="password" id="tokenInput" placeholder="Auth token (stored in session)">

  <div class="stats-row" id="statsRow">
    <div class="stat-card"><div class="num" id="statTotal">—</div><div class="label">Memories</div></div>
    <div class="stat-card"><div class="num" id="statTags">—</div><div class="label">Unique Tags</div></div>
    <div class="stat-card"><div class="num" id="statScopes">—</div><div class="label">Scopes</div></div>
  </div>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search memories... (e.g. 'deployment server architecture')" autofocus>
    <button onclick="search()">Search</button>
  </div>

  <div class="tabs">
    <div class="tab active" id="tabMemories" onclick="switchTab('memories')">Memories</div>
    <div class="tab" id="tabGroom" onclick="switchTab('groom')">Groom Log</div>
  </div>

  <div class="panel active" id="panelMemories">
    <div class="filters" id="filters"></div>
    <div id="results"></div>
  </div>

  <div class="panel" id="panelGroom">
    <div style="display:flex;gap:8px;margin-bottom:16px;align-items:center;">
      <select id="groomStatusFilter" onchange="loadGroomLog()" style="background:#151528;border:1px solid #1e2a3a;border-radius:8px;color:#c8d6e5;padding:8px;">
        <option value="">All statuses</option>
        <option value="pending">Pending</option>
        <option value="applied">Applied</option>
        <option value="rejected">Rejected</option>
      </select>
      <button onclick="loadGroomLog()" style="background:#00d4ff;color:#0f0f1a;border:none;border-radius:8px;padding:8px 16px;cursor:pointer;font-weight:600;">Refresh</button>
    </div>
    <div id="groomResults"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '';
let TOKEN = sessionStorage.getItem('central_mem_token') || '';
let allResults = [];
let currentScope = '';

document.getElementById('tokenInput').value = TOKEN;
document.getElementById('tokenInput').addEventListener('input', () => {
  TOKEN = document.getElementById('tokenInput').value;
  sessionStorage.setItem('central_mem_token', TOKEN);
  loadDashboard();
});

async function api(path, opts = {}) {
  const res = await fetch(API + path, {
    ...opts,
    headers: { ...opts.headers, 'Authorization': `Bearer ${TOKEN}` },
  });
  if (!res.ok) {
    if (res.status === 401) { showError('Unauthorized — check your token'); return null; }
    const text = await res.text();
    showError(`HTTP ${res.status}: ${text.slice(0, 100)}`);
    return null;
  }
  return res.json();
}

function showError(msg) {
  const el = document.getElementById('toast');
  el.textContent = '⚠️ ' + msg;
  el.style.display = 'block';
  el.style.borderColor = '#e94560';
  setTimeout(() => { el.style.display = 'none'; }, 4000);
}

async function loadDashboard() {
  if (!TOKEN) return;
  const stats = await api('/memories/stats');
  if (stats) {
    document.getElementById('statTotal').textContent = stats.total_memories;
    document.getElementById('statTags').textContent = stats.unique_tags;
    document.getElementById('statScopes').textContent = stats.scopes?.length || 0;
  }
  search();
}

async function search() {
  if (!TOKEN) { document.getElementById('results').innerHTML = '<div class="empty"><div class="icon">🔐</div>Enter your auth token above</div>'; return; }
  const q = document.getElementById('searchInput').value.trim();
  const resultsDiv = document.getElementById('results');
  resultsDiv.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

  let url = '/memories/search?limit=20';
  if (q) url += '&q=' + encodeURIComponent(q);

  const data = await api(url);
  if (!data) { resultsDiv.innerHTML = ''; return; }

  allResults = data.results || [];
  renderResults(allResults);

  const allTags = new Set();
  allResults.forEach(r => (r.tags || []).forEach(t => allTags.add(t)));
  renderFilters([...allTags]);
}

function renderFilters(tags) {
  const div = document.getElementById('filters');
  div.innerHTML = '<button class="filter-btn' + (!currentScope ? ' active' : '') + '" onclick="setScope(\'\')">All</button>' +
    tags.map(t => `<button class="filter-btn${currentScope === t ? ' active' : ''}" onclick="setScope('${t}')">${t}</button>`).join('');
}

function setScope(tag) {
  currentScope = tag;
  const filtered = tag ? allResults.filter(r => (r.tags || []).includes(tag)) : allResults;
  renderResults(filtered);
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.textContent === (tag || 'All')));
}

function renderResults(results) {
  const div = document.getElementById('results');
  if (!results || results.length === 0) {
    div.innerHTML = '<div class="empty"><div class="icon">📭</div><div>No memories found</div></div>';
    return;
  }
  div.innerHTML = results.map(m => `
    <div class="memory fade-in">
      <div class="content">${escHtml(m.content)}</div>
      <div class="meta">
        <span class="tags">${(m.tags || []).map(t => `<span class="tag">${escHtml(t)}</span>`).join('')}</span>
        ${m.source ? `<span class="source">📦 ${escHtml(m.source)}</span>` : ''}
        ${m.scope ? `<span class="badge">${escHtml(m.scope)}</span>` : ''}
        <span class="time">🕐 ${m.updated_at || ''}</span>
      </div>
    </div>
  `).join('');
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') search(); });

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');
  document.getElementById('panel' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');
  if (name === 'groom') loadGroomLog();
}

async function loadGroomLog() {
  const div = document.getElementById('groomResults');
  div.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  const status = document.getElementById('groomStatusFilter').value;
  const params = status ? '?status=' + status : '';
  const data = await api('/memories/groom/log' + params);
  if (!data) { div.innerHTML = ''; return; }
  if (!data.actions || data.actions.length === 0) {
    div.innerHTML = '<div class="empty"><div class="icon">📋</div><div>No groom actions yet</div></div>';
    return;
  }
  div.innerHTML = data.actions.map(a => {
    const srcIds = a.source_ids ? (Array.isArray(a.source_ids) ? a.source_ids.join(', ') : a.source_ids) : '';
    return `<div class="groom-entry fade-in">
      <div><span class="action ${a.action}">${a.action}</span> <span class="status ${a.status}">${a.status}</span></div>
      ${a.target_id ? `<div style="margin-top:4px;color:#657;font-size:12px;">Target: <code style="color:#c8d6e5;">${escHtml(a.target_id)}</code></div>` : ''}
      ${srcIds ? `<div style="margin-top:2px;color:#657;font-size:12px;">Sources: <code style="color:#c8d6e5;">${escHtml(srcIds)}</code></div>` : ''}
      <div class="reason">${escHtml(a.reason || '')}</div>
      ${a.metadata ? `<div style="color:#485;font-size:11px;margin-top:4px;">${escHtml(a.metadata.slice(0, 200))}</div>` : ''}
      <div class="meta">
        <span>${a.created_at || ''}</span>
        ${a.status === 'pending' ? `
          <button class="groom-btn apply" onclick="applyGroom('${a.id}')">Apply</button>
          <button class="groom-btn reject" onclick="rejectGroom('${a.id}')">Reject</button>
        ` : ''}
      </div>
    </div>`;
  }).join('');
}

async function applyGroom(id) {
  const data = await api('/memories/groom/apply/' + id, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
  if (data) loadGroomLog();
}

async function rejectGroom(id) {
  const data = await api('/memories/groom/reject/' + id, { method: 'POST' });
  if (data) loadGroomLog();
}

if (TOKEN) loadDashboard();
</script>
</body>
</html>
