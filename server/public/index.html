<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Central Memory</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background: #1a1a2e; color: #e0e0e0; }
  h1 { color: #00d4ff; }
  .search-box { display: flex; gap: 8px; margin: 20px 0; }
  .search-box input { flex: 1; padding: 10px; border: 1px solid #333; border-radius: 6px; background: #16213e; color: #e0e0e0; font-size: 14px; }
  .search-box button { padding: 10px 20px; background: #00d4ff; color: #1a1a2e; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
  .memory { background: #16213e; border: 1px solid #333; border-radius: 8px; padding: 16px; margin: 12px 0; }
  .memory .content { white-space: pre-wrap; margin: 8px 0; }
  .memory .meta { font-size: 12px; color: #888; display: flex; gap: 12px; flex-wrap: wrap; }
  .memory .tags { display: flex; gap: 4px; flex-wrap: wrap; }
  .memory .tag { background: #0f3460; color: #00d4ff; padding: 2px 8px; border-radius: 4px; font-size: 11px; }
  .memory .score { color: #e94560; font-weight: 600; }
  .stats { color: #888; font-size: 13px; margin: 8px 0; }
  #error { color: #e94560; }
  .loading { text-align: center; padding: 40px; color: #888; }
  .header-bar { display: flex; justify-content: space-between; align-items: center; }
</style>
</head>
<body>
<div class="header-bar">
  <h1>🧠 Central Memory</h1>
  <span class="stats" id="stats"></span>
</div>
<div class="search-box">
  <input type="text" id="searchInput" placeholder="Search memories..." autofocus>
  <button onclick="searchMemories()">Search</button>
</div>
<div id="results"></div>

<script>
const API = '';
const TOKEN = localStorage.getItem('token') || prompt('Enter auth token:') || '';
localStorage.setItem('token', TOKEN);

async function searchMemories() {
  const q = document.getElementById('searchInput').value.trim();
  const resultsDiv = document.getElementById('results');
  resultsDiv.innerHTML = '<div class="loading">Searching...</div>';

  try {
    const url = q ? `${API}/memories/search?q=${encodeURIComponent(q)}&limit=20` : `${API}/memories/search?limit=20`;
    const res = await fetch(url, { headers: { 'Authorization': `Bearer ${TOKEN}` } });
    if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);
    const data = await res.json();
    renderResults(data.results || []);
  } catch (e) {
    resultsDiv.innerHTML = `<div id="error">Error: ${e.message}</div>`;
  }
}

async function fetchStats() {
  try {
    const res = await fetch(`${API}/memories/search?limit=0`, { headers: { 'Authorization': `Bearer ${TOKEN}` } });
    if (res.ok) {
      const data = await res.json();
      document.getElementById('stats').textContent = `${data.results.length}+ memories`;
    }
  } catch {}
}

function renderResults(results) {
  const resultsDiv = document.getElementById('results');
  if (results.length === 0) {
    resultsDiv.innerHTML = '<div style="text-align:center;padding:40px;color:#888;">No memories found</div>';
    return;
  }
  resultsDiv.innerHTML = results.map(m => `
    <div class="memory">
      <div class="content">${escapeHtml(m.content)}</div>
      <div class="meta">
        <span class="tags">${(m.tags || []).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}</span>
        <span>scope: ${m.scope}</span>
        <span>source: ${m.source}</span>
        ${m.score ? `<span class="score">score: ${m.score.toFixed(3)}</span>` : ''}
        <span>${new Date(m.updated_at).toLocaleString()}</span>
      </div>
    </div>
  `).join('');
}

function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') searchMemories(); });
searchMemories();
fetchStats();
</script>
</body>
</html>
